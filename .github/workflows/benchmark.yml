name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'src/**/*.py'
  workflow_dispatch:

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install poetry
          poetry config virtualenvs.create false
          poetry install --no-interaction --with benchmark
      - name: Run benchmarks
        run: pytest tests/benchmarks/ --benchmark-only --benchmark-json output.json --no-cov
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: output.json
